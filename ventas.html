<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Comisiones</title>
    <link rel="stylesheet" href="ventas.css">
</head>
<body>

    <div class="contenedor">
        <h1>Calculadora de Comisiones</h1>

        <div class="campo">
            <label>Salario Base:</label>
            <input type="number" id="txtSueldoBase" placeholder="0.00">
        </div>

        <div class="campo">
            <label>Número de ventas:</label>
            <input type="number" id="txtVentas" placeholder="Ej: 5">
        </div>

        <div class="campo">
            <label>Precio del producto:</label>
            <input type="number" id="txtPrecio" placeholder="0.00">
        </div>

        <button onclick="calcular()">Calcular Comisión</button>

        <div class="seccion-resultados">
            <h2>Resultados</h2>
            <p>Salario Base: <span id="spSueldoBase">$0.00</span></p>
            <p>Comisión: <span id="spComision">$0.00</span></p>
            <p class="total">Total: <span id="spTotal">$0.00</span></p>
        </div>
    </div>

    <script src="ventas.js"></script>
    <script src="utilitarios.js"></script>
</body>
</html>
